{% extends 'base.html' %}

{% block title %}Работа над ошибками — Шаг 1{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Progress -->
            <div class="d-flex justify-content-center mb-4">
                <div class="d-flex align-items-center gap-2">
                    <span class="badge bg-primary rounded-pill px-3 py-2">1. Параметры</span>
                    <i class="fas fa-arrow-right text-muted"></i>
                    <span class="badge bg-secondary rounded-pill px-3 py-2">2. Превью</span>
                    <i class="fas fa-arrow-right text-muted"></i>
                    <span class="badge bg-secondary rounded-pill px-3 py-2">3. Создание</span>
                </div>
            </div>

            <h2 class="mb-4"><i class="fas fa-magic"></i> Работа над ошибками для класса</h2>

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="step" value="2">

                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-users"></i> Класс</h5>
                    </div>
                    <div class="card-body">
                        <select name="group_id" class="form-select" required>
                            <option value="">Выберите класс...</option>
                            {% for g in groups %}
                            <option value="{{ g.pk }}">{{ g }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-sliders-h"></i> Параметры</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Название работы</label>
                                <input type="text" name="work_name" class="form-control"
                                       value="Работа над ошибками">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">
                                    Порог слабости (%)
                                    <i class="fas fa-info-circle text-muted"
                                       title="Группы с результатом ниже этого порога считаются слабыми"></i>
                                </label>
                                <input type="number" name="threshold" class="form-control"
                                       value="70" min="10" max="100" step="5">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Ограничение</label>
                                <select name="limit_type" class="form-select" id="limitType">
                                    <option value="tasks">По количеству заданий</option>
                                    <option value="weight">По суммарному весу (≈ сложность)</option>
                                    <option value="time">По времени выполнения (мин)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" id="limitLabel">Максимум заданий</label>
                                <input type="number" name="limit_value" class="form-control"
                                       value="10" min="1" max="100" id="limitValue">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-search"></i> Анализировать →
                </button>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('limitType').addEventListener('change', function() {
    const label = document.getElementById('limitLabel');
    const input = document.getElementById('limitValue');
    if (this.value === 'tasks') {
        label.textContent = 'Максимум заданий';
        input.value = 10; input.max = 50;
    } else if (this.value === 'weight') {
        label.textContent = 'Макс. суммарный вес';
        input.value = 20; input.max = 100;
    } else {
        label.textContent = 'Макс. время (мин)';
        input.value = 45; input.max = 180;
    }
});
</script>
{% endblock %}
